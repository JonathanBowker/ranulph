spec:
  name: sample-laravel
  services:
  - environment_slug: php
    github:
      branch: main
      deploy_on_push: false
      repo: JonathanBowker/ranulph
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    build_command: composer install --no-interaction --prefer-dist --optimize-autoloader && npm ci && npm run build
    envs:
    - key: APP_ENV
      value: production
    - key: APP_DEBUG
      value: "false"
    - key: APP_URL
      value: https://sample-laravel-h4bwp.ondigitalocean.app
    - key: APP_KEY
      scope: RUN_TIME
      type: SECRET
      value: ${APP_KEY}
    - key: SESSION_DRIVER
      value: file
    - key: SESSION_FILES
      value: /tmp/laravel-sessions
    - key: SESSION_SECURE_COOKIE
      value: "true"
    - key: DB_CONNECTION
      value: sqlite
    - key: DB_DATABASE
      value: /tmp/database.sqlite
    name: web
    run_command: mkdir -p /tmp/laravel-sessions && if [ ! -f /tmp/database.sqlite ]; then cp database/database.sqlite /tmp/database.sqlite; fi && php artisan migrate --force && heroku-php-apache2 public/
    source_dir: /
