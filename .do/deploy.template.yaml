spec:
  name: sample-laravel
  services:
  - environment_slug: php
    github:
      branch: main
      deploy_on_push: false
      repo: JonathanBowker/ranulph
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    build_command: composer install --no-interaction --prefer-dist --optimize-autoloader && npm ci && npm run build
    envs:
    - key: APP_ENV
      value: production
    - key: APP_DEBUG
      value: "false"
    - key: APP_KEY
      scope: RUN_TIME
      type: SECRET
      value: ${APP_KEY}
    name: web
    run_command: heroku-php-apache2 public/
    source_dir: /
